<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0b0d16" />
    <title>Sin conexión · Phygitalia</title>
    <style>
      :root {
        --bg-0: #080a12;
        --gold: #e3b063;
        --gold-bright: #f6dca0;
        --text: #ece7dd;
        --text-dim: #9d97a9;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
      }
      body {
        min-height: 100dvh;
        display: grid;
        place-items: center;
        text-align: center;
        padding: 2rem;
        color: var(--text);
        font-family: "Chakra Petch", ui-monospace, system-ui, sans-serif;
        background:
          radial-gradient(60% 80% at 20% 12%, rgba(201, 138, 94, 0.18), transparent 60%),
          radial-gradient(70% 90% at 84% 22%, rgba(80, 96, 150, 0.2), transparent 65%),
          radial-gradient(55% 60% at 50% 82%, rgba(227, 176, 99, 0.1), transparent 60%),
          linear-gradient(160deg, #0a0c16, #0b0d18 40%, #0d0e19 70%, #0a0b13);
      }
      .rune {
        width: 84px;
        height: 84px;
        margin: 0 auto 1.5rem;
        border-radius: 50%;
        background: center / 62% no-repeat url("/runa.png");
        filter: drop-shadow(0 0 20px rgba(227, 176, 99, 0.35));
        animation: spin 8s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      h1 {
        margin: 0 0 0.6rem;
        font-size: 1.4rem;
        font-weight: 600;
        letter-spacing: 0.06em;
        color: var(--gold-bright);
      }
      p {
        margin: 0 auto 1.6rem;
        max-width: 34ch;
        color: var(--text-dim);
        line-height: 1.6;
        font-size: 0.95rem;
      }
      button {
        padding: 0.85rem 2.4rem;
        border: none;
        border-radius: 999px;
        cursor: pointer;
        font-family: inherit;
        font-weight: 600;
        font-size: 0.9rem;
        letter-spacing: 0.16em;
        color: var(--bg-0);
        background: linear-gradient(135deg, var(--gold-bright), var(--gold) 60%);
        box-shadow: 0 0 30px rgba(227, 176, 99, 0.35);
      }
      @media (prefers-reduced-motion: reduce) {
        .rune {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="rune" aria-hidden="true"></div>
      <h1>El portal está en silencio</h1>
      <p>
        No hay conexión ahora mismo. Los Oráculos esperan tras el umbral — vuelve a intentarlo en
        cuanto recuperes la red.
      </p>
      <button type="button" onclick="location.reload()">REINTENTAR</button>
    </main>
  </body>
</html>
